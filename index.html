.speech-bubble {
    position: absolute;
    top: 40px;
    left: 430px;

    width: 300px;          /* Adjust width here */
    background: #117912;
    color: white;

    border-radius: .4em;
    padding: 15px 20px;
    text-align: left;
}

.speech-bubble:after {
    content: '';
    position: absolute;
    left: 0;
    top: 50%;

    width: 0;
    height: 0;

    border: 20px solid transparent;
    border-right-color: #117912;
    border-left: 0;
    border-top: 0;          /* Changed from border-bottom: 0 */

    margin-top: -10px;
    margin-left: -20px;
}

        h3 {
            margin: 0;
            font-size: 1.1em;
            font-weight: normal;
        }
